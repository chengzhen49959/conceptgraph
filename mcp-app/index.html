<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concept Graph</title>
    <style>
      html,
      body {
        margin: 0;
      }
      /* No height:100% chain here. An MCP App is auto-resized to its CONTENT
         height (the SDK observes body/documentElement and reports it to the
         host). A 100% chain has no intrinsic height, so it collapses to the
         host's tiny default (~250px) and just fills that. The React shell sets
         an explicit pixel height instead, which the host grows the frame to. */
      #root {
        width: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
